<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0a0908"/>
  <!-- lattice edges -->
  <g stroke="#3a3733" stroke-width="1.2">
    <path d="M16 6 L26 24 L6 24 Z" fill="none"/>
    <path d="M16 6 L16 16.8"/>
    <path d="M6 24 L16 16.8"/>
    <path d="M26 24 L16 16.8"/>
  </g>
  <!-- outer nodes -->
  <circle cx="16" cy="6" r="2" fill="#8a8580"/>
  <circle cx="6" cy="24" r="2" fill="#8a8580"/>
  <circle cx="26" cy="24" r="2" fill="#8a8580"/>
  <!-- ember core with glow -->
  <circle cx="16" cy="16.8" r="5" fill="#ff4d00" opacity="0.25"/>
  <circle cx="16" cy="16.8" r="3" fill="#ff4d00"/>
</svg>
